<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Riwayat Pendidikan - Dengan Garis Rapi</title>
    <style>
        /* Gaya sederhana agar tabel terlihat rapi dengan garis tegas */
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #1a2b4c;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 28px;
            border-bottom: 3px solid #cfdee9;
            padding-bottom: 15px;
        }
        /* Tabel dengan border yang rapi dan tegas */
        table {
            width: 100%;
            border-collapse: collapse;  /* menghilangkan jarak ganda antar border */
            border: 2px solid #2c3e50;  /* border luar tabel tebal */
            font-size: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        /* Border untuk semua sel (th dan td) */
        th, td {
            border: 1.5px solid #3a4e6b;  /* garis antar sel yang jelas */
            padding: 14px 18px;
            text-align: left;
            vertical-align: middle;
        }
        /* Header tabel dengan latar gelap dan teks putih */
        th {
            background-color: #1e3a5f;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            border-bottom: 3px solid #0f2a44;  /* garis bawah header lebih tebal */
        }
        /* Warna latar sel data putih bersih */
        td {
            background-color: #ffffff;
            color: #1e2f3e;
        }
        /* Opsi baris warna selang-seling agar lebih rapi dan mudah dibaca */
        tbody tr:nth-child(even) td {
            background-color: #f5f9ff;
        }
        /* Kolom pertama (jenjang) sedikit ditebalkan */
        td:first-child {
            font-weight: 600;
            color: #0b2b40;
        }
        /* Efek hover ringan untuk interaksi */
        tr:hover td {
            background-color: #e4edf7;
            transition: background-color 0.15s;
        }
        /* Responsif untuk layar kecil */
        @media (max-width: 500px) {
            .container {
                padding: 15px;
            }
            th, td {
                padding: 10px 8px;
                font-size: 14px;
            }
            h2 {
                font-size: 24px;
            }
        }
        /* Footer catatan kecil */
        .footer-note {
            text-align: right;
            font-size: 0.9rem;
            color: #4a5e75;
            margin-top: 20px;
            border-top: 1px dashed #b3c4d4;
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 RIWAYAT PENDIDIKAN</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Jenjang</th>
                    <th>Nama Institusi</th>
                    <th>Program Studi / Jurusan</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>🏫 SMK</td>
                    <td><strong>SMK Panca Dharma</strong></td>
                    <td>Teknik Komputer & Jaringan</td>
                </tr>
                <tr>
                    <td>🎓 Universitas</td>
                    <td><strong>Universitas Mulia</strong></td>
                    <td>Teknologi Informasi</td>
                </tr>
                <!-- Anda bisa menambahkan baris lain jika diperlukan -->
            </tbody>
        </table>
        
        <!-- Catatan kecil dengan data tambahan -->
        <div class="footer-note">
            ⚡ Data terverifikasi · 2025
        </div>
    </div>
</body>
</html>
